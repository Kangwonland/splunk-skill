name: Create Release

on:
  push:
    tags: ['v*-splunk*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          SKILL_VER=$(echo "$TAG" | sed 's/^v//' | sed 's/-splunk.*//')
          SPLUNK_VER=$(echo "$TAG" | sed 's/.*-splunk//')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "skill_ver=$SKILL_VER" >> $GITHUB_OUTPUT
          echo "splunk_ver=$SPLUNK_VER" >> $GITHUB_OUTPUT

      - name: Package .skill file
        run: |
          cd skills/splunk-spl
          zip -r ../../splunk-spl.skill .
          cd ../..
          echo "Package size: $(wc -c < splunk-spl.skill) bytes"

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" splunk-spl.skill \
            --title "splunk-spl ${{ steps.tag.outputs.skill_ver }} (Splunk Enterprise ${{ steps.tag.outputs.splunk_ver }})" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
